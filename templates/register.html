<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Registrarse — Botk2-IA</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center py-10">
<div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
  <div class="text-center mb-8">
    <h1 class="text-2xl font-bold text-slate-800">Botk2-IA</h1>
    <p class="text-slate-500 mt-1">Creá tu cuenta gratis</p>
  </div>
  {% if error %}
  <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm">{{ error }}</div>
  {% endif %}
  <form method="post" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Nombre de la clínica / consultorio *</label>
      <input type="text" name="name" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ej: Clínica San Martín"/>
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Email *</label>
      <input type="email" name="email" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña *</label>
      <input type="password" name="password" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Teléfono</label>
      <input type="text" name="phone" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="+54 11 1234-5678"/>
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Dirección</label>
      <input type="text" name="address" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
    </div>
    <button type="submit" class="w-full bg-blue-600 text-white rounded-lg py-2.5 font-semibold text-sm hover:bg-blue-700 transition-colors">Crear cuenta gratis</button>
  </form>
  <p class="text-center text-sm text-slate-500 mt-6">¿Ya tenés cuenta? <a href="/login" class="text-blue-600 hover:underline">Iniciá sesión</a></p>
</div>
</body></html>
