<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pago cancelado — Botk2-IA</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center px-4">
<div class="w-full max-w-sm text-center">

  <div class="w-16 h-16 bg-slate-200 rounded-full flex items-center justify-center mx-auto mb-6">
    <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
    </svg>
  </div>

  <h1 class="text-2xl font-bold text-slate-800 mb-2">Pago no completado</h1>
  <p class="text-slate-500 text-sm mb-8">
    No se realizó ningún cargo. Podés intentarlo de nuevo cuando quieras.
  </p>

  <div class="space-y-3">
    <a href="/dashboard"
       class="block w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-colors">
      Volver al panel
    </a>
    <a href="/#pricing"
       class="block w-full border border-slate-200 hover:bg-slate-100 text-slate-600 font-medium py-3 rounded-xl transition-colors">
      Ver planes
    </a>
  </div>

</div>
</body>
</html>
