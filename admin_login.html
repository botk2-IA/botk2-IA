<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Botk2-IA</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 flex items-center justify-center">

  <div class="w-full max-w-sm mx-4">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-blue-600 rounded-2xl mb-4">
        <svg viewBox="0 0 100 100" class="w-9 h-9">
          <path d="M14,80 L28,49 L41,62 L56,17 L83,80 Z" fill="white"/>
          <circle cx="56" cy="17" r="5.5" fill="#93C5FD"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Panel Admin</h1>
      <p class="text-slate-400 text-sm mt-1">Acceso exclusivo — Botk2-IA</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      {% if error %}
      <div class="mb-4 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/admin/login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña de administrador</label>
          <input type="password" name="password" required autofocus
            class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="••••••••"/>
        </div>
        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition-colors text-sm">
          Ingresar
        </button>
      </form>
    </div>

    <p class="text-center text-slate-500 text-xs mt-6">
      Esta área está restringida al equipo de Botk2-IA
    </p>
  </div>

</body>
</html>
