<head>
  <meta charset="UTF-8"/>

  <title>Turnos — Clínica San Martín</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .sidebar-link { display:flex; align-items:center; gap:12px; padding:10px 16px; border-radius:8px; color:#cbd5e1; font-size:14px; font-weight:500; text-decoration:none; transition:all .2s; }
    .sidebar-link:hover { background:#334155; color:white; }
    .sidebar-link.active { background:#2563eb; color:white; }
    .card { background:white; border-radius:12px; box-shadow:0 1px 3px rgba(0,0,0,.08); border:1px solid #f1f5f9; padding:24px; }
    .badge-pending   { background:#fef9c3; color:#854d0e; font-size:11px; font-weight:700; padding:2px 10px; border-radius:999px; }
    .badge-confirmed { background:#dcfce7; color:#166534; font-size:11px; font-weight:700; padding:2px 10px; border-radius:999px; }
    .badge-cancelled { background:#fee2e2; color:#991b1b; font-size:11px; font-weight:700; padding:2px 10px; border-radius:999px; }
    .day-cell { min-height: 80px; border: 1px solid #e2e8f0; border-radius: 8px; padding: 6px; cursor: pointer; transition: background .15s; }
    .day-cell:hover { background: #f8fafc; }
    .day-cell.today { border-color: #2563eb; background: #eff6ff; }
    .day-cell.selected { border-color: #2563eb; background: #dbeafe; }
    .day-cell.other-month { opacity: 0.35; }
    .appt-dot { font-size: 10px; padding: 1px 6px; border-radius: 4px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>

        <p style="color:#93c5fd;font-size:11px;font-weight:700;text-transform:uppercase;">Plan Starter</p>

  <!-- Main -->
  <main style="flex:1; overflow-y:auto;">
    <header style="background:white;border-bottom:1px solid #e2e8f0;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;">

        <button onclick="showNewAppt()" style="padding:8px 16px;background:#2563eb;color:white;font-weight:700;border:none;border-radius:8px;cursor:pointer;font-size:14px;">+ Nuevo turno</button>

    </header>

        <!-- Calendario -->
        <div class="card" style="padding:16px;">

          </div>

          <!-- Vista Mes -->
          <div id="view-month">
            <!-- Días de la semana -->
            <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;">
              <div style="text-align:center;font-size:12px;font-weight:600;color:#64748b;padding:4px;">Dom</div>
              <div style="text-align:center;font-size:12px;font-weight:600;color:#64748b;padding:4px;">Lun</div>
              <div style="text-align:center;font-size:12px;font-weight:600;color:#64748b;padding:4px;">Mar</div>

              <div style="text-align:center;font-size:12px;font-weight:600;color:#64748b;padding:4px;">Jue</div>
              <div style="text-align:center;font-size:12px;font-weight:600;color:#64748b;padding:4px;">Vie</div>

    </div>

<script>
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS_SHORT = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

const today = new Date();
let currentYear = today.getFullYear();
let currentMonth = today.getMonth();
let selectedDate = new Date(today);
let currentView = 'month';

// Demo data
const appts = {
  [`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`]: [
    {time:'09:00', patient:'María González', specialty:'Cardiología', status:'confirmed'},
    {time:'09:30', patient:'Carlos Pérez', specialty:'Kinesiología', status:'pending'},
    {time:'10:00', patient:'Ana Rodríguez', specialty:'Odontología', status:'confirmed'},
    {time:'11:00', patient:'Luis Martínez', specialty:'Cardiología', status:'confirmed'},
    {time:'14:00', patient:'Sofía Herrera', specialty:'Odontología', status:'cancelled'},
  ],
};
// Generar datos demo para otros días
for(let i=1;i<=28;i++){
  const d = new Date(today.getFullYear(), today.getMonth(), i);
  const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
  if(!appts[key] && Math.random()>0.4){
    const n = Math.floor(Math.random()*6)+1;
    appts[key] = [];
    const specs = ['Cardiología','Kinesiología','Odontología','Psicología'];
    const names = ['Roberto Silva','Laura Gómez','Diego Torres','Valentina Cruz','Marcos López','Julia Fernández'];
    const hours = ['08:30','09:00','09:30','10:00','10:30','11:00','14:00','14:30','15:00','16:00'];
    for(let j=0;j<n;j++){
      appts[key].push({
        time: hours[j],
        patient: names[j % names.length],
        specialty: specs[j % specs.length],
        status: ['confirmed','confirmed','pending','cancelled'][Math.floor(Math.random()*4)]
      });
    }
  }
}

function getKey(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

function setView(v){
  currentView = v;
  ['month','week','list'].forEach(x=>{
    document.getElementById(`view-${x}`).style.display = x===v ? 'block' : 'none';
    const btn = document.getElementById(`btn-${x}`);
    btn.style.background = x===v ? '#2563eb' : 'white';
    btn.style.color = x===v ? 'white' : '#64748b';
  });
  render();
}

function render(){
  document.getElementById('calTitle').textContent = `${MONTHS[currentMonth]} ${currentYear}`;
  document.getElementById('subtitleDate').textContent = `${MONTHS[currentMonth]} ${currentYear}`;
  if(currentView==='month') renderMonth();
  else if(currentView==='week') renderWeek();
  else renderList();
  renderDayPanel(selectedDate);
  renderWeekBar();
}

function renderMonth(){
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const first = new Date(currentYear, currentMonth, 1);
  const last = new Date(currentYear, currentMonth+1, 0);
  const startDay = first.getDay();

  // Días del mes anterior
  for(let i=0;i<startDay;i++){
    const d = new Date(currentYear, currentMonth, -startDay+i+1);
    grid.appendChild(makeCell(d, true));
  }
  // Días del mes
  for(let i=1;i<=last.getDate();i++){
    const d = new Date(currentYear, currentMonth, i);
    grid.appendChild(makeCell(d, false));
  }
  // Rellenar hasta completar grilla
  const total = startDay + last.getDate();
  const rem = total % 7 === 0 ? 0 : 7 - (total % 7);
  for(let i=1;i<=rem;i++){
    const d = new Date(currentYear, currentMonth+1, i);
    grid.appendChild(makeCell(d, true));
  }
}

function makeCell(d, otherMonth){
  const div = document.createElement('div');
  div.className = 'day-cell' + (otherMonth?' other-month':'');
  const isToday = d.toDateString()===today.toDateString();
  const isSelected = d.toDateString()===selectedDate.toDateString();
  if(isSelected) div.className += ' selected';
  else if(isToday) div.className += ' today';

  const key = getKey(d);
  const dayAppts = appts[key] || [];
  const count = dayAppts.length;

  div.innerHTML = `<div style="font-size:13px;font-weight:${isToday||isSelected?'700':'500'};color:${isToday?'#2563eb':isSelected?'#1e40af':'#1e293b'};margin-bottom:3px;">${d.getDate()}</div>`;

  if(count>0){
    const maxShow = 2;
    dayAppts.slice(0,maxShow).forEach(a=>{
      const colors = {confirmed:'#dcfce7;color:#166534',pending:'#fef9c3;color:#854d0e',cancelled:'#fee2e2;color:#991b1b'};
      div.innerHTML += `<div class="appt-dot" style="background:${colors[a.status]||'#e0e7ff;color:#3730a3'}">${a.time} ${a.patient.split(' ')[0]}</div>`;
    });
    if(count>maxShow) div.innerHTML += `<div style="font-size:10px;color:#94a3b8;margin-top:2px;">+${count-maxShow} más</div>`;
  }

  div.onclick = ()=>{ selectedDate = d; render(); };
  return div;
}

function renderWeek(){
  const grid = document.getElementById('weekGrid');
  const startOfWeek = new Date(selectedDate);
  startOfWeek.setDate(selectedDate.getDate() - selectedDate.getDay());

  let html = '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;">';
  for(let i=0;i<7;i++){
    const d = new Date(startOfWeek);
    d.setDate(startOfWeek.getDate()+i);
    const key = getKey(d);
    const dayAppts = appts[key]||[];
    const isToday = d.toDateString()===today.toDateString();
    const isSelected = d.toDateString()===selectedDate.toDateString();
    html += `<div onclick="selectedDate=new Date(${d.getTime()});render()" style="border:1px solid ${isSelected?'#2563eb':isToday?'#93c5fd':'#e2e8f0'};background:${isSelected?'#dbeafe':isToday?'#eff6ff':'white'};border-radius:10px;padding:10px;cursor:pointer;min-height:120px;">
      <p style="font-size:12px;font-weight:600;color:#64748b;text-align:center;">${DAYS_SHORT[d.getDay()]}</p>
      <p style="font-size:22px;font-weight:800;text-align:center;color:${isToday?'#2563eb':'#1e293b'};margin-bottom:8px;">${d.getDate()}</p>
      ${dayAppts.map(a=>`<div style="font-size:10px;padding:2px 4px;background:#dbeafe;color:#1e40af;border-radius:4px;margin-bottom:2px;">${a.time} ${a.patient.split(' ')[0]}</div>`).join('')}
    </div>`;
  }
  html += '</div>';
  grid.innerHTML = html;
}

function renderList(){
  const grid = document.getElementById('listGrid');
  const start = new Date(currentYear, currentMonth, 1);
  const end = new Date(currentYear, currentMonth+1, 0);
  let html = '';
  for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){
    const key = getKey(d);
    const dayAppts = appts[key]||[];
    if(dayAppts.length===0) continue;
    const isToday = d.toDateString()===today.toDateString();
    html += `<div style="margin-bottom:16px;">
      <p style="font-size:13px;font-weight:700;color:${isToday?'#2563eb':'#64748b'};margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #f1f5f9;">${DAYS_SHORT[d.getDay()]} ${d.getDate()} de ${MONTHS[d.getMonth()]}</p>
      ${dayAppts.map(a=>{
        const colors = {confirmed:'#dcfce7;color:#166534',pending:'#fef9c3;color:#854d0e',cancelled:'#fee2e2;color:#991b1b'};
        return `<div style="display:flex;align-items:center;gap:12px;padding:10px;border-radius:8px;border:1px solid #f1f5f9;margin-bottom:4px;">
          <span style="font-size:13px;font-weight:700;color:#1e293b;min-width:44px;">${a.time}</span>
          <div style="flex:1;"><p style="font-size:14px;font-weight:600;">${a.patient}</p><p style="font-size:12px;color:#94a3b8;">${a.specialty}</p></div>
          <span style="font-size:11px;font-weight:700;padding:2px 10px;border-radius:999px;background:${colors[a.status]||'#e0e7ff;color:#3730a3'}">${a.status}</span>
        </div>`;
      }).join('')}
    </div>`;
  }
  grid.innerHTML = html || '<p style="color:#94a3b8;text-align:center;padding:40px;">No hay turnos este mes</p>';
}

function renderDayPanel(d){
  const key = getKey(d);
  const dayAppts = appts[key]||[];
  const isToday = d.toDateString()===today.toDateString();
  document.getElementById('dayPanelTitle').textContent = isToday ? 'Turnos de hoy' : `Turnos del ${d.getDate()} de ${MONTHS[d.getMonth()]}`;
  document.getElementById('dayPanelDate').textContent = `${DAYS_SHORT[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
  const container = document.getElementById('dayAppts');
  if(dayAppts.length===0){
    container.innerHTML = '<p style="color:#94a3b8;font-size:13px;text-align:center;padding:20px 0;">Sin turnos este día</p>';
    return;
  }
  const colors = {confirmed:'#dcfce7;color:#166534',pending:'#fef9c3;color:#854d0e',cancelled:'#fee2e2;color:#991b1b'};
  container.innerHTML = dayAppts.map(a=>`
    <div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;border:1px solid #f1f5f9;margin-bottom:6px;">
      <span style="font-size:13px;font-weight:700;min-width:40px;">${a.time}</span>
      <div style="flex:1;"><p style="font-size:13px;font-weight:600;">${a.patient}</p><p style="font-size:11px;color:#94a3b8;">${a.specialty}</p></div>
      <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;background:${colors[a.status]||'#e0e7ff;color:#3730a3'}">${a.status}</span>
    </div>`).join('');
}

function renderWeekBar(){
  const container = document.getElementById('weekBar');
  const days = [];
  for(let i=0;i<7;i++){
    const d = new Date(today);
    d.setDate(today.getDate()+i);
    days.push(d);
  }
  const max = Math.max(...days.map(d=>( appts[getKey(d)]||[]).length), 1);
  container.innerHTML = days.map((d,i)=>{
    const count = (appts[getKey(d)]||[]).length;
    const label = i===0?'Hoy':i===1?'Mañana':`${DAYS_SHORT[d.getDay()]} ${d.getDate()}`;
    return `<div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:12px;color:#64748b;width:68px;flex-shrink:0;">${label}</span>
      <div style="flex:1;background:#e2e8f0;border-radius:999px;height:8px;"><div style="background:#3b82f6;height:8px;border-radius:999px;width:${Math.round(count/max*100)}%;transition:width .3s;"></div></div>
      <span style="font-size:12px;font-weight:700;color:#1e293b;width:16px;text-align:right;">${count}</span>
    </div>`;
  }).join('');
}

function prevMonth(){ currentMonth--; if(currentMonth<0){currentMonth=11;currentYear--;} render(); }
function nextMonth(){ currentMonth++; if(currentMonth>11){currentMonth=0;currentYear++;} render(); }
function goToday(){ currentMonth=today.getMonth(); currentYear=today.getFullYear(); selectedDate=new Date(today); render(); }
function showNewAppt(){
  document.getElementById('newApptDate').valueAsDate = selectedDate;
  document.getElementById('modal').style.display='flex';
}
function closeModal(){ document.getElementById('modal').style.display='none'; }
document.getElementById('modal').addEventListener('click', e=>{ if(e.target===document.getElementById('modal')) closeModal(); });

render();
</script>
</body>
</html>
